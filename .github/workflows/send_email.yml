name: Run Cold Email Bot

on:
  schedule:
    # Run once at the start of every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub Actions tab
    inputs:
      force:
        description: 'Bypass day-off and hourly checks'
        required: false
        type: boolean
        default: false

permissions:
  # Give workflow write access to commit leads.csv and state.json changes back to repo
  contents: write

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-format: '3.10'
          cache: 'pip' # caching pip dependencies

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Email Sender
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.hostinger.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          MIN_DELAY_MINUTES: ${{ secrets.MIN_DELAY_MINUTES || '5' }}
          MAX_DELAY_MINUTES: ${{ secrets.MAX_DELAY_MINUTES || '45' }}
        run: |
          # If manual run has "force" checked, pass --force
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python bot.py send-one $FORCE_FLAG

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add state files and data files that were modified by the run
          git add leads.csv state.json bot.log || true
          
          # Check if there are changes staged for commit
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update lead status and scheduler state [skip ci]"
            git push
          fi
